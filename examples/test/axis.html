<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>MathBox - Axis</title>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@latest/build/three.min.js"></script>
  <script type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/three@latest/examples/js/controls/OrbitControls.js"></script>
  <!--
      - a minified version mathbox.min.js is also available;
      - recommend using a specific version (not @latest) in public sites
    -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mathbox@latest/build/bundle/mathbox.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathbox@latest/build/mathbox.css" />
  <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
</head>

<body>
  <script>
    mathbox = MathBox.mathBox({
      plugins: ["core", "controls", "cursor"],
      controls: {
        klass: THREE.OrbitControls,
      },
      camera: {
        fov: 45,
      },
    });
    three = mathbox.three;

    three.camera.position.set(6, 2, 3);
    three.renderer.setClearColor(new THREE.Color(0xffffff), 1.0);

    colors = {
      x: new THREE.Color(0.6, 0.6, 0.6),
      y: new THREE.Color(0.6, 0.6, 0.6),
      z: new THREE.Color(0.6, 0.6, 0.6),
      // mg: new Three.Color(0.3,0.3,0.3),
      // x: new THREE.Color(0xff4136),
      // y: new THREE.Color(0x2ecc40),
      // z: new THREE.Color(0x0074d9),
    };

    view = mathbox
      // .set({
      //   scale: 720,
      //   focus: 1,
      // })
      .cartesian({
        range: [
          [-1, 1],
          [-1, 1],
          [-1, 1],
        ],
        scale: [1, 1, 1],
      });
    view.axis({
      color: colors.x,
    });
    view.axis({
      axis: 2, // "y" also works
      color: colors.y,
    });
    view.axis({
      axis: 3,
      color: colors.z,
    });

    mathbox
      .select("axis")
      .set("end", true)
      .set("width", 9)
      // .bind("depth", function (t) {
      //   return 0.5 + 0.5 * Math.sin(t * 0.5);})
      ;

    view.array({
      id: "colors",
      live: false,
      data: [colors.x, colors.y, colors.z].map(function (color) {
        return [color.r, color.g, color.b, 1];
      }),
    });

    view
      .array({
        data: [
          [1.05, 0, 0],
          [0, 1.05, 0],
          [0, 0, 1.05],
        ],
        channels: 3, // necessary
        live: false,
      })
      .text({
        data: ["x", "y", "z"],
      })
      .label({
        color: 0xffffff,
        colors: "#colors",
        offset: [0, 0],
      });


    view
      .transform({
        position: [0, 0, 0],
      })
      .grid({
        axes: [1, 3],
        width: 1,
        color: [0.8, 0.8, 0.8],
        depth: 0.5,
        divideX: 10,
      })
      .end()





    // view.array({
    //   bufferWidth: 20,
    //   width: 12,
    //   channels: 3,
    //   expr: (emit, i) => {
    //     let angle = (i / 12) * MathBox.τ;
    //     emit(Math.cos(angle), 0, Math.sin(angle));
    //   },
    // });

    // view
    //   .transform({
    //     position: [0, 1, 0],
    //     scale: [0.5, 0.5, 0.5],
    //   })
    //   .line({
    //     closed: true,
    //     color: 'blue',
    //     width: 20,
    //     join: "miter",
    //   });

    // 上下边框
    view.array({
      data: [[1, 0, 1], [1, 0, -1], [-1, 0, -1], [-1, 0, 1]],
      channels: 3,
      live: false,
    },
    )

    view
      .transform({
        position: [0, 1, 0],
        scale: [1, 1, 1],
      })
      .line({
        closed: true,
        color: [0.8,0.8,0.8],
        width: 2,
        join: "miter",
      })
      .end()


    view
      .transform({
        position: [0, -1, 0],
        scale: [1, 1, 1],
      })
      .line({
        closed: true,
        color: [0.8,0.8,0.8],
        width: 2,
        join: "miter",
      })
      .end()

    // 侧边框
    view.array({
      data: [[1, 1, 0], [-1, 1, 0], [-1, -1, 0], [1, -1, 0]],
      channels: 3,
      live: false,
    },
    )

    view
      .transform({
        position: [0, 0, 1],
        scale: [1, 1, 1],
      })
      .line({
        closed: true,
        color: [0.8,0.8,0.8],
        width: 2,
        join: "miter",
      })
      .end()


    view
      .transform({
        position: [0, 0, -1],
        scale: [1, 1, 1],
      })
      .line({
        closed: true,
        color: [0.8,0.8,0.8],
        width: 2,
        join: "miter",
      })
      .end()

    // var camera = view.camera(
    //   {
    //     lookAt: [0, 0, 0],
    //   },
    //   {
    //     position: function (t) {
    //       return [
    //         -4.5 * Math.cos(0.1 * t),
    //         1,
    //         -4.5 * Math.sin(0.1 * t),
    //       ];
    //     },
    //   }
    // );
  </script>
</body>

</html>
