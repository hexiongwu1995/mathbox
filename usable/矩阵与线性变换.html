<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>矩阵与线性变换</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
    <!--
       - a minified version mathbox.min.js is also available;
       - recommend using a specific version (not @latest) in public sites
    -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mathbox@latest/build/bundle/mathbox.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui@latest/build/dat.gui.min.js"></script>
    <link rel="stylesheet" href="../../build/mathbox.css" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
    <script src="MathJax-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@4/startup.js" defer></script>
    <!-- AsciiMath的输入语法请参考这个链接： https://asciimath.org/ -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>平移和旋转变换</h1>

    <p>设点 `P` 的坐标为 `(1,3,0)`，我们将对其进行平移和旋转变换。</p>
    <div class="display"> `P = ((1),(3),(0))` </div>
    
    <div id="gui-container" style="width: 600px; height:200px; margin: 50px auto;"></div>
    <div id="mathbox-container" style="width: 800px; height: 800px;"></div>

    <script>
        var image = document.getElementById("mathbox-container");
        var mathbox = MathBox.mathBox({
            element: image,
            plugins: ["core", "controls", "cursor"],
            controls: {
                // Orbit controls, i.e. Euler angles, with gimbal lock
                klass: THREE.OrbitControls,

                // Trackball controls, i.e. Free quaternion rotation
                // klass: THREE.TrackballControls,
            },
        });
        if (mathbox.fallback) throw "WebGL not supported";

        var three = mathbox.three;
        three.renderer.setClearColor(new THREE.Color(0xffffff), 1.0);

        // Dat GUI
        var gui = new dat.GUI({ autoPlace: false });
        document.getElementById("gui-container").appendChild(gui.domElement);
        var props = {
            angle: 180,
            x: 0,
            z: 0,
        };
        gui.add(props, "angle").min(0).max(360).step(5);
        gui.add(props, "x").min(-1).max(1).step(0.05);
        gui.add(props, "z").min(-1).max(1).step(0.05);

        // DOM
        mathbox.set("focus", 3);

        var camera = mathbox.camera({
            proxy: true,
            position: [3, 2, 2],
        });

        var view = mathbox.clock({ speed: 1 / 16 }).cartesian({
            range: [
                [-2, 2],
                [-4, 4],
                [-2, 2],
            ],
            scale: [1, 1, 1],
        });

        // Axes + grid
        [1, 2, 3].forEach(item => {
            view.axis({
                axis: item,
                width: 2,
                color: "black",
            })
        })

        view
            .grid({
                axes: "xz",
                width: 1,
                divideX: 10,
                divideY: 10,
                color: [0.6, 0.8, 0.8, 1],
            });


        // Compute 2D area of a rotated hyperbolic surface
        var data = view.area({
            axes: "xz",
            expr: function (emit, x, z, i, j, t) {

                var angleRad = (props.angle * MathBox.τ) / 360;
                var cos = Math.cos(angleRad);
                var sin = Math.sin(angleRad);

                var x2 = x + props.x;
                var z2 = z + props.z;

                var x3 = x2 * cos + z2 * sin;
                var z3 = -x2 * sin + z2 * cos;

                emit(x, x3 * x3 - z3 * z3, z);
            },
            width: 65,
            height: 65,
            channels: 3,
        });

    </script>
</body>

</html>
